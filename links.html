<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utku Arslan — Links</title>
<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f2ed" media="(prefers-color-scheme: light)">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>_</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* --- Palette --- */

  :root {
    --bg: #0a0a0a;
    --fg: #c8c8c8;
    --fg-bright: #efefef;
    --fg-dim: #707070;
    --green: #4af626;
    --green-dim: #3aaa22;
    --border: #282828;
    --surface: #111115;
  }

  @media (prefers-color-scheme: light) {
    :root:not([data-theme="dark"]) {
      --bg: #f5f2ed; --fg: #4a453e; --fg-bright: #1c1a17; --fg-dim: #736b60;
      --green: #2a7a1a; --green-dim: #2e7d1e; --border: #d8d3cb;
      --surface: #ece8e1;
    }
  }
  :root[data-theme="light"] {
    --bg: #f5f2ed; --fg: #4a453e; --fg-bright: #1c1a17; --fg-dim: #736b60;
    --green: #2a7a1a; --green-dim: #2e7d1e; --border: #d8d3cb;
    --surface: #ece8e1;
  }

  /* --- Base --- */

  ::selection {
    background: var(--green);
    color: var(--bg);
  }

  html { background: var(--bg); }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
    font-size: 13px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,246,38,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,246,38,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    box-shadow: 0 0 80px rgba(74,246,38,0.04), 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- Header --- */
  .header {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .header-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--green);
    text-transform: uppercase;
    font-weight: 500;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .name {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--fg-bright);
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .name span {
    color: var(--green);
  }

  .tagline {
    margin-top: 8px;
    font-size: 12px;
    color: var(--fg-dim);
    letter-spacing: 0.05em;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* --- QR Section --- */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .qr-wrap {
    position: relative;
    padding: 16px;
    background: #fff;
    border-radius: 14px;
    display: inline-flex;
    box-shadow: 0 0 30px rgba(74,246,38,0.15);
  }

  .qr-wrap img {
    width: 160px;
    height: 160px;
    display: block;
    image-rendering: crisp-edges;
  }

  .qr-hint {
    font-size: 10px;
    color: var(--fg-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* --- Links --- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--fg);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13px;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .link-btn:hover {
    background: rgba(74,246,38,0.05);
    border-color: rgba(74,246,38,0.25);
    transform: translateX(4px);
  }

  .link-btn:hover .icon-wrap {
    background: rgba(74,246,38,0.15);
  }

  .icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .icon-wrap svg {
    width: 18px;
    height: 18px;
  }

  .link-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .link-name {
    font-weight: 700;
    font-size: 13px;
    color: var(--fg-bright);
  }

  .link-val {
    font-size: 10px;
    color: var(--fg-dim);
    letter-spacing: 0.05em;
  }

  .link-arrow {
    margin-left: auto;
    color: var(--fg-dim);
    font-size: 16px;
    transition: transform 0.2s;
  }

  .link-btn:hover .link-arrow {
    color: var(--green);
    transform: translateX(2px);
  }


  /* --- Theme toggle (inside card) --- */

  .theme-toggle {
    background: none;
    border: 1px solid var(--border);
    color: var(--fg-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 3px;
    transition: color 0.15s, border-color 0.15s;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .theme-toggle:hover {
    color: var(--green);
    border-color: var(--green);
  }


  /* --- Mobile --- */

  @media (max-width: 480px) {
    body { padding: 12px; align-items: flex-start; padding-top: 24px; }
    .card {
      padding: 20px 16px;
      gap: 16px;
      border-radius: 16px;
    }
    .header { gap: 2px; }
    .label { display: none; }
    .name { font-size: 20px; }
    .tagline { margin-top: 4px; font-size: 11px; }
    .links { gap: 6px; }
    .link-btn { padding: 10px 12px; gap: 12px; }
    .icon-wrap { width: 32px; height: 32px; }
    .icon-wrap svg { width: 16px; height: 16px; }
    .qr-section { gap: 8px; }
    .qr-wrap { padding: 10px; }
    .qr-wrap img { width: 120px; height: 120px; }
    .qr-hint { font-size: 9px; }
    .theme-toggle { font-size: 10px; padding: 3px 8px; }
  }

  /* --- Reduced motion --- */

  @media (prefers-reduced-motion: reduce) {
    .card, .label, .name, .tagline, .qr-section, .links {
      animation: none;
      opacity: 1;
      transform: none;
    }
  }
</style>
<script>
  var t = localStorage.getItem('theme');
  if (t) document.documentElement.setAttribute('data-theme', t);
</script>
</head>
<body>

<script>
  // Theme toggle
  var toggle = document.getElementById('themeToggle');
  var root = document.documentElement;

  function isDark() {
    var theme = root.getAttribute('data-theme');
    if (theme) return theme === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function updateLabel() {
    var dark = isDark();
    toggle.textContent = dark ? 'light' : 'dark';
    toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  updateLabel();

  toggle.addEventListener('click', function() {
    var next = isDark() ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateLabel();
  });
</script>

</html>
