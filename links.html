<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utku Arslan</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.08);
    --accent: #7fff6e;
    --accent2: #6e9fff;
    --text: #f0f0f0;
    --muted: #666;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(127,255,110,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(127,255,110,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    box-shadow: 0 0 80px rgba(127,255,110,0.04), 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* --- Header --- */
  .header {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: 38px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .name span {
    color: var(--accent);
  }

  .tagline {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* --- QR Section --- */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.6s 0.25s ease both;
  }

  .qr-wrap {
    position: relative;
    padding: 16px;
    background: #fff;
    border-radius: 14px;
    display: inline-flex;
    box-shadow: 0 0 30px rgba(127,255,110,0.15);
  }

  .qr-wrap img {
    width: 160px;
    height: 160px;
    display: block;
    image-rendering: crisp-edges;
  }

  .qr-hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  /* --- Links --- */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.6s 0.35s ease both;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-decoration: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  .link-btn:hover {
    background: rgba(127,255,110,0.05);
    border-color: rgba(127,255,110,0.25);
    transform: translateX(4px);
  }

  .link-btn:hover .icon-wrap {
    background: rgba(127,255,110,0.15);
  }

  .icon-wrap {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .icon-wrap svg {
    width: 18px;
    height: 18px;
  }

  .link-info {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .link-name {
    font-weight: 500;
    font-size: 13px;
  }

  .link-val {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .link-arrow {
    margin-left: auto;
    color: var(--muted);
    font-size: 16px;
    transition: transform 0.2s;
  }

  .link-btn:hover .link-arrow {
    color: var(--accent);
    transform: translateX(2px);
  }

  /* WhatsApp accent */
  .link-btn.wa:hover {
    border-color: rgba(37,211,102,0.3);
    background: rgba(37,211,102,0.04);
  }
  .link-btn.wa .icon-wrap { background: rgba(37,211,102,0.1); }

  /* Footer */
  .footer {
    text-align: center;
    font-size: 10px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 0.1em;
    animation: fadeUp 0.6s 0.45s ease both;
  }

  .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    vertical-align: middle;
    margin: 0 6px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
</style>
</head>
