<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>partly badge</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,700&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #edeae3;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 16px;
  }

  a {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    text-decoration: none;
    opacity: 0.45;
    transition: opacity 0.3s ease;
  }

  a:hover { opacity: 0.8; }

  .label {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-style: italic;
    font-size: 11px;
    color: rgba(0,0,0,0.5);
    letter-spacing: 0.04em;
  }

  .wordmark {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-style: normal;
    font-size: 18px;
    color: rgba(0,0,0,0.75);
    letter-spacing: -0.03em;
    line-height: 1;
  }
</style>
</head>
<body>
  <a href="https://partly.ink" target="_blank">
    <span class="label">made with</span>
    <span class="wordmark">Partly</span>
  </a>
</body>
</html>
